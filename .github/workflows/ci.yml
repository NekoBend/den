name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agents:
    name: agents (skills)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          # questionary + rich are den's runtime deps: ty needs them importable to
          # resolve den/_ui.py's imports (no .venv in a fresh CI checkout).
          pip install ruff ty questionary rich
          sudo apt-get update && sudo apt-get install -y bats
      - name: Ruff lint
        run: ruff check agents den tests hatch_build.py
      - name: Ruff format check
        run: ruff format --check agents den tests hatch_build.py
      - name: Type check the den package (ty)
        run: ty check den
      - name: Lint generated parent prompts (agents/dist invariants)
        # build.py + parts/ live in the private agents/.private/ (gitignored), so
        # CI cannot rebuild dist/ to diff it. Instead assert the invariants build.py
        # guarantees on the committed output: no leaked HTML comments, ASCII dashes
        # only (em/en/minus are banned in shipped prompts), and no trailing space.
        run: |
          python3 - <<'PY'
          import glob, sys
          BAD = {chr(0x2014): "em-dash", chr(0x2013): "en-dash", chr(0x2212): "minus-sign"}
          problems = []
          files = sorted(glob.glob("agents/dist/*.md"))
          for f in files:
              for i, line in enumerate(open(f, encoding="utf-8"), 1):
                  raw = line.rstrip("\n")
                  if "<!--" in raw:
                      problems.append(f"{f}:{i}: HTML comment leaked into shipped prompt")
                  for ch, name in BAD.items():
                      if ch in raw:
                          problems.append(f"{f}:{i}: {name} U+{ord(ch):04X} (parent prompts must use ASCII dashes)")
                  if raw != raw.rstrip():
                      problems.append(f"{f}:{i}: trailing whitespace")
          if problems:
              print("\n".join(problems)); sys.exit(1)
          print(f"agents/dist: {len(files)} parent prompt(s) clean")
          PY
      - name: Bats (run-checks)
        run: bats agents/shared/scripts/tests/run-checks.bats

  tests:
    name: tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: Pytest (verification scripts)
        run: python3 -m pytest agents/shared/scripts/tests
      - name: Pytest (den CLI)
        run: python3 -m pytest tests/den

  packaging:
    name: packaging (wheel + sourceless install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install uv
        run: pip install uv
      - name: Build sdist + wheel
        run: uv build -o dist .
      - name: Assert wheel + sdist are complete and clean
        run: |
          python3 - <<'PY'
          import glob, tarfile, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          bad = [n for n in names if "/tests/" in n or n.endswith((".pyc", ".bats"))]
          assert not bad, f"unwanted files in wheel: {bad}"
          # the POSIX helper executables must survive into the wheel bundle,
          # else `den install shell --bin` installs nothing from a wheel.
          assert any(n.endswith("_data/shell/posix/bin/fixids") for n in names), \
              "shell/posix/bin/fixids missing from wheel"
          # the parent prompts (agents/dist) must survive into the sdist too,
          # else a sdist-built install loses `--with-parent` (unanchored dist/).
          sdist = glob.glob("dist/*.tar.gz")[0]
          members = tarfile.open(sdist).getnames()
          assert any("/agents/dist/CLAUDE.md" in m for m in members), \
              "agents/dist missing from sdist"
          print(f"wheel clean ({len(names)} entries), sdist has agents/dist")
          PY
      - name: Install from sdist + smoke test
        run: |
          # install from the SDIST (uv tool install git+URL may build via sdist);
          # this is the path that the unanchored dist/ ignore broke.
          python3 -m venv /tmp/denv
          /tmp/denv/bin/pip install dist/*.tar.gz
          # run from /tmp (away from the checkout) so content resolves from the
          # bundled den/_data, not the repo root -- this is what git+URL gives.
          cd /tmp
          /tmp/denv/bin/den --version
          # cheatsheets deploy from the bundled content (den cheat moved to the shell)
          XDG_DATA_HOME=/tmp/dendata /tmp/denv/bin/den install cheatsheets
          test -f /tmp/dendata/den/cheatsheets/shell/one-liners.md
          /tmp/denv/bin/den install skills --target /tmp/sk --with-parent
          test -f /tmp/sk/skills/coding/SKILL.md
          grep -q "/tmp/sk/skills/coding/shared/reference" /tmp/sk/skills/coding/SKILL.md
          test -f /tmp/sk/CLAUDE.md   # parent prompt installed (needs agents/dist)
          /tmp/denv/bin/den install shell --dry-run | grep -q '\[dry\]'
          # --bin path works from the wheel bundle (non-tty, so the flag is needed)
          /tmp/denv/bin/den install shell --no-extras --bin
          test -x "$HOME/.local/bin/fixids"

  shell:
    name: shell env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: ShellCheck (errors only)
        run: |
          shellcheck --severity=error \
            shell/posix/*.sh \
            shell/bash/*.bash \
            tests/shell/*.sh \
            shell/posix/bin/*
      - name: PSScriptAnalyzer (errors only)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $files = Get-ChildItem shell/pwsh/*.ps1 -File
          $errs = $files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error
          }
          if ($errs) {
            $errs | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $(@($errs).Count) error(s)"
          }
          Write-Output 'PSScriptAnalyzer: 0 errors'

  shell-tests:
    name: shell functional tests (bash/zsh/pwsh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build and run the shell test image
        run: |
          docker build -t den-shell-test -f tests/shell/Dockerfile .
          docker run --rm den-shell-test
